name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # CI sadece macOS .dmg uretir. Windows .exe icin canvas (pdfjs-dist alt
    # bagimliligi) GitHub runner'da native compile edilemiyor; .exe yerel
    # 'npm run dist:win' ile uretilip release'e manuel upload ediliyor.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: "*.dmg"
            build_cmd: "npm run dist:mac"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: ${{ matrix.build_cmd }}
        env:
          # macOS'ta sertifika yoksa imzasız build'e izin ver (geliştirici
          # doğrulanmamış uyarısıyla açılır, normal davranış).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # electron-builder'ın GitHub'a otomatik publish etmesi için:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soru-tahmini-${{ matrix.name }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.dmg
          draft: false
          generate_release_notes: true
          body: |
            ## Indirme

            - **macOS (Apple Silicon)**: `Soru.Tahmini-*-arm64.dmg`
            - **Windows**: `Soru.Tahmini.Setup.*.exe` (yerel build, manuel eklenir)

            ## Notlar

            - Windows .exe CI'da uretilmiyor; `pdfjs-dist`'in alt bagimliligi `canvas`
              GitHub runner'da native compile edilemiyor. .exe yerel 'npm run dist:win'
              ile uretilip release'e manuel ekleniyor.
            - macOS imzasiz build: ilk acista "dogrulanmamis gelistirici" uyarisi
              cikabilir. Sistem Ayarlari -> Gizlilik ve Guvenlik -> "Yine de ac".
            - Windows imzasiz build: SmartScreen uyarisi cikabilir.
              "More info" -> "Run anyway".
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
